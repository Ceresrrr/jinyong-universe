<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>🏯 金庸武侠宇宙 · 全人物数据库</title>
<style>
:root {
  --bg:#060612; --panel:#101025; --panel2:#181835; --border:#282848;
  --gold:#e8c176; --gold2:#f4d8a8; --text:#c4c4d2; --head:#efe0c8;
  --accent:#d4a060; --red:#e46868; --green:#60b878; --blue:#5e9ed6;
  --tag-bg:#1c1c3a; --hover:#262650;
  --shadow:0 6px 28px rgba(0,0,0,.4); --glow:0 0 24px rgba(232,193,118,.12);
  --radius:12px; --radius-sm:8px; --transition:.28s cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','Microsoft YaHei',sans-serif;min-height:100vh;line-height:1.65}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#3a3a5a}

header{background:linear-gradient(170deg,#0a0a1a 0%,#140e1a 25%,#1a1210 60%,#0a0a18 100%);border-bottom:1px solid #3a2810;padding:32px 20px 22px;text-align:center;position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 50% 120%,rgba(232,193,118,.08) 0%,transparent 60%);pointer-events:none}
header::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(232,193,118,.3),transparent)}
header h1{color:var(--head);font-size:2.3em;font-weight:700;letter-spacing:3px;text-shadow:0 0 50px rgba(232,193,118,.3),0 2px 4px rgba(0,0,0,.6);position:relative}
header p{color:var(--accent);margin-top:6px;font-size:.85em;opacity:.8;letter-spacing:1px}

nav{display:flex;flex-wrap:wrap;gap:5px;padding:8px 16px;background:rgba(8,8,22,.96);border-bottom:1px solid rgba(255,255,255,.05);position:sticky;top:0;z-index:100;backdrop-filter:blur(16px)}
nav button{padding:8px 16px;border:1px solid transparent;border-radius:20px;background:var(--tag-bg);color:#a8a8c0;cursor:pointer;font-size:.82em;font-weight:500;transition:var(--transition);white-space:nowrap;letter-spacing:.3px;position:relative;overflow:hidden}
nav button::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,.02));pointer-events:none}
nav button:hover{background:var(--hover);color:#ddd;border-color:rgba(255,255,255,.1);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
nav button.active{background:linear-gradient(135deg,#c89040,#a06828);color:#120800;border-color:transparent;font-weight:600;box-shadow:0 2px 16px rgba(200,144,64,.4)}
nav button.active::before{background:none}

main{padding:24px;max-width:1520px;margin:0 auto;min-height:70vh}
section{display:none;animation:fadeIn .35s ease}
section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:linear-gradient(145deg,var(--panel),var(--panel2));border:1px solid rgba(255,255,255,.05);border-radius:var(--radius);padding:22px 16px;text-align:center;transition:var(--transition);cursor:default;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(232,193,118,.06),transparent 70%);pointer-events:none}
.stat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow),var(--glow);border-color:rgba(232,193,118,.15)}
.stat-card h3{color:#888;font-size:.75em;margin-bottom:8px;text-transform:uppercase;letter-spacing:1.5px;position:relative}
.stat-card .num{font-size:2.6em;color:var(--gold);font-weight:700;text-shadow:0 0 24px rgba(232,193,118,.2);position:relative}

table{width:100%;border-collapse:collapse;font-size:.82em}
th{background:#161638;color:var(--head);padding:12px 10px;border-bottom:2px solid var(--border);text-align:left;position:sticky;top:52px;z-index:5;font-weight:600;font-size:.78em;letter-spacing:.5px}
td{padding:10px;border-bottom:1px solid #1a1a32;vertical-align:top}
tr:hover td{background:rgba(232,193,118,.03)}
tr:nth-child(even) td{background:rgba(255,255,255,.01)}
td:first-child{color:#555;font-size:.78em;text-align:center;width:36px}
td:nth-child(2){font-weight:600;color:var(--head)}
td:last-child{color:#aaa;font-size:.8em;max-width:280px}

.book-section{margin-bottom:16px;background:var(--panel);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius);overflow:hidden;transition:var(--transition)}
.book-section:hover{border-color:rgba(255,255,255,.08)}
.book-title{color:var(--gold);font-size:1.1em;padding:14px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:var(--panel2);border-bottom:1px solid rgba(255,255,255,.04);user-select:none;transition:var(--transition)}
.book-title:hover{background:#202045}
.book-title .toggle{font-size:.6em;opacity:.4}
.book-content{padding:0;overflow:hidden}
.book-content table{margin:0;font-size:.76em}
.book-content th{top:0;background:#141430}

.tag{display:inline-block;padding:3px 10px;border-radius:4px;font-size:.7em;margin:1px;font-weight:500}
.tag-blood{background:#4a1a1a;color:#f88;border:1px solid #6a2828}
.tag-master{background:#1a3a1a;color:#8e8;border:1px solid #285828}
.tag-love{background:#3a1a3a;color:#f8f;border:1px solid #582858}
.tag-hate{background:#4a2818;color:#fa6;border:1px solid #6a3818}
.tag-cross{background:#3a2808;color:#fc8;border:1px solid #5a4018}

.search-box{width:100%;padding:14px 20px;border:2px solid rgba(255,255,255,.06);border-radius:24px;background:var(--panel);color:var(--text);font-size:.95em;margin-bottom:16px;transition:var(--transition);outline:none}
.search-box:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(232,193,118,.08)}
.search-box::placeholder{color:#444}

.rel-card{background:var(--panel);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius);padding:14px 18px;margin:6px 0;display:flex;align-items:center;gap:12px;flex-wrap:wrap;transition:var(--transition)}
.rel-card:hover{border-color:rgba(255,255,255,.1);background:var(--panel2);box-shadow:0 4px 16px rgba(0,0,0,.2)}
.rel-card .a,.rel-card .b{font-weight:600;color:var(--head);font-size:.9em}
.rel-card .arrow{color:var(--gold);font-weight:bold}

.tab-sub{margin:0 0 14px;display:flex;gap:4px;flex-wrap:wrap}
.tab-sub button{padding:8px 18px;border:1px solid rgba(255,255,255,.06);background:var(--tag-bg);color:#999;border-radius:20px;cursor:pointer;font-size:.78em;transition:var(--transition)}
.tab-sub button:hover{color:#ddd;border-color:rgba(255,255,255,.15)}
.tab-sub button.active{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600;box-shadow:0 0 16px rgba(94,158,214,.2)}

footer{text-align:center;padding:28px;color:#3a3a4a;font-size:.7em;border-top:1px solid rgba(255,255,255,.04);margin-top:40px;letter-spacing:.5px}

.section-divider{color:var(--gold);font-size:1.4em;padding:20px 0 10px;margin:32px 0 12px;border-bottom:2px solid rgba(232,193,118,.15);letter-spacing:2px}
.anchor-section{scroll-margin-top:70px}

.kf-card{background:var(--panel);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius);padding:16px 18px;transition:var(--transition)}
.kf-card h4{color:var(--gold);margin-bottom:4px;font-size:.95em}
.kf-card .user{color:var(--accent);font-size:.8em;margin:3px 0}
.kf-card .book{font-size:.72em;opacity:.45}

.detail-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(1,1,8,.94);z-index:200;overflow-y:auto;backdrop-filter:blur(16px)}
.detail-overlay.show{display:block;animation:fadeIn .3s ease}
.detail-container{max-width:860px;margin:0 auto;min-height:100vh;background:linear-gradient(180deg,#0b0b20 0%,#080814 100%)}
.detail-header{display:flex;align-items:center;gap:16px;padding:14px 24px;border-bottom:1px solid rgba(255,255,255,.05);background:rgba(16,16,36,.85);position:sticky;top:0;z-index:10;backdrop-filter:blur(12px)}
.back-btn{padding:9px 22px;border:1px solid var(--gold);border-radius:24px;background:transparent;color:var(--gold);cursor:pointer;font-size:.82em;font-weight:600;transition:var(--transition);letter-spacing:.5px}
.back-btn:hover{background:rgba(232,193,118,.1);box-shadow:0 0 20px rgba(232,193,118,.15);transform:translateX(-3px)}
.detail-type{color:#666;font-size:.75em}
.detail-body{padding:0}
.detail-hero{padding:36px 36px 28px;border-bottom:1px solid rgba(255,255,255,.04);background:linear-gradient(180deg,rgba(232,193,118,.04) 0%,transparent 100%)}
.detail-hero h2{color:var(--head);font-size:2.1em;margin-bottom:8px;letter-spacing:1px}
.detail-hero .hero-sub{color:var(--accent);font-size:1em;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.detail-hero .hero-tag{display:inline-block;padding:4px 14px;border-radius:14px;font-size:.7em;font-weight:700;border:1px solid}
.detail-hero .hero-tag.cross{background:#3a2808;color:#fc8;border-color:#5a4018}
.detail-hero .hero-tag.nocross{background:#1a1a2a;color:#777;border-color:#333}
.detail-sections{padding:24px 36px}
.detail-section{margin-bottom:28px}
.detail-section h3{color:var(--gold);font-size:.78em;letter-spacing:2px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:10px}
.detail-section h3::before{content:'';width:3px;height:18px;background:linear-gradient(180deg,var(--gold),transparent);border-radius:2px}
.detail-section .content{color:#bbb;font-size:.92em;line-height:2.1}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:20px}
.detail-info-card{background:var(--panel);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius-sm);padding:16px 18px}
.detail-info-card .card-label{color:var(--gold);font-size:.68em;letter-spacing:1.5px;margin-bottom:8px;font-weight:600}
.detail-info-card .card-value{color:#bbb;font-size:.86em;line-height:1.6}
.detail-rel-list{display:flex;flex-wrap:wrap;gap:8px}
.detail-rel-item{background:var(--panel);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius-sm);padding:10px 16px;font-size:.8em;display:flex;align-items:center;gap:8px;transition:var(--transition)}
.detail-rel-item:hover{border-color:rgba(255,255,255,.1)}.detail-rel-item .rel-a{color:var(--head);font-weight:600}.detail-rel-item .rel-arrow{color:var(--gold)}.detail-rel-item .rel-type{color:var(--accent);font-size:.78em}

.char-card{cursor:pointer!important;position:relative;background:var(--panel);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius-sm);padding:14px 30px 14px 16px;transition:var(--transition)}
.char-card:hover{border-color:rgba(232,193,118,.2)!important;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.35)}
.char-card::after{content:'';position:absolute;right:12px;top:50%;width:5px;height:5px;border-right:2px solid #444;border-bottom:2px solid #444;transform:translateY(-70%) rotate(-45deg);transition:var(--transition)}
.char-card:hover::after{border-color:var(--gold)}
.char-name{font-weight:600;color:var(--head);font-size:.88em}
.kf-card.clickable{cursor:pointer}
.kf-card.clickable:hover{border-color:rgba(232,193,118,.15)!important;transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.35)}
.kf-card.clickable::after{content:'›';float:right;color:#3a3a4a;font-size:1.4em;line-height:1;transition:var(--transition)}
.kf-card.clickable:hover::after{color:var(--gold)}

.rank-card{background:var(--panel);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius-sm);padding:12px 16px;cursor:pointer;transition:var(--transition)}
.rank-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.35);border-color:rgba(255,255,255,.1)}

.tl-wrap{position:relative;max-width:900px;margin:0 auto;padding:30px 0 30px 140px}
.tl-wrap::before{content:'';position:absolute;left:110px;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#8B4513,#B8860B,#CD853F,#DAA520,#8FBC8F,#6B8E23,#4682B4,#5F9EA0,#9370DB,#C71585);border-radius:2px}
.tl-era{text-align:left;padding:40px 0 12px 0;position:relative;z-index:1;margin-left:-140px}
.tl-era h3{display:inline-block;background:var(--panel);color:var(--gold);padding:8px 24px;border-radius:20px;border:1px solid rgba(232,193,118,.2);font-size:.85em;letter-spacing:2px;box-shadow:0 0 16px rgba(232,193,118,.06);margin-left:110px}
.tl-row{display:flex;align-items:flex-start;margin:4px 0;position:relative}
.tl-date-badge{width:100px;text-align:right;padding-right:24px;flex-shrink:0;position:relative;margin-left:-140px}
.tl-date-badge span{display:inline-block;background:var(--panel);color:var(--accent);padding:4px 10px;border-radius:10px;font-size:.7em;font-weight:600;white-space:nowrap;border:1px solid rgba(255,255,255,.05)}
.tl-card{flex:1;max-width:650px;background:var(--panel);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius);padding:14px 18px;transition:var(--transition);margin-left:12px}
.tl-card:hover{border-color:rgba(255,255,255,.1);box-shadow:0 4px 16px rgba(0,0,0,.3);transform:translateX(2px)}
.tl-title{color:var(--head);font-weight:600;font-size:.92em;margin-bottom:4px}
.tl-desc{font-size:.78em;color:#999;line-height:1.6}
.tl-book{display:inline-block;padding:3px 10px;border-radius:4px;font-size:.64em;font-weight:600;margin-top:6px}
@media(max-width:768px){.tl-wrap{padding:20px 0 20px 60px}.tl-wrap::before{left:38px}.tl-era{margin-left:-60px}.tl-era h3{font-size:.75em;padding:6px 16px;margin-left:38px}.tl-date-badge{width:50px;padding-right:14px;margin-left:-60px}.tl-date-badge span{font-size:.62em;padding:2px 6px}.tl-card{margin-left:6px;padding:10px 12px}}

.map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.map-card{background:var(--panel);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius);padding:16px 18px;transition:var(--transition);border-left:4px solid}
.map-card:hover{border-color:rgba(255,255,255,.1);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.map-card h4{color:var(--head);font-size:.9em;margin-bottom:4px}
.map-card .map-book{font-size:.68em;opacity:.4}
.map-card .map-desc{font-size:.76em;color:#999;margin-top:8px;line-height:1.6}

.cp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.cp-card{background:var(--panel);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius);padding:16px 18px;transition:var(--transition);display:flex;align-items:center;gap:14px}
.cp-card:hover{border-color:rgba(255,255,255,.1);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.cp-emoji{font-size:2.2em;flex-shrink:0;filter:drop-shadow(0 0 6px rgba(255,255,255,.1))}
.cp-info{flex:1}
.cp-names{color:var(--head);font-weight:600;font-size:.9em}
.cp-type-tag{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.64em;font-weight:600;margin:4px 0}
.cp-desc{font-size:.74em;color:#999;margin-top:3px;line-height:1.5}

@media(max-width:768px){
  nav{padding:6px 8px;gap:3px}
  nav button{padding:7px 12px;font-size:.72em}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .stat-card{padding:14px 10px}
  .stat-card .num{font-size:1.6em}
  header h1{font-size:1.4em}
  main{padding:10px}
  .detail-container{max-width:100vw!important}
  .detail-hero{padding:20px 16px}
  .detail-sections{padding:16px}
  .detail-hero h2{font-size:1.4em}
  .cp-grid{grid-template-columns:1fr}
  .tl-item{padding-left:54px}
}
</style>
</head>
<body>
<header>
<h1>🏯 金庸武侠宇宙 · 全人物数据库</h1>
<p>15部小说 · 800+人物 · 跨书关系 · 武功门派 · 传承补遗</p>
</header>

<nav id="mainNav">
<button class="active" onclick="showTab('characters')">👥 人物索引</button>
<button onclick="showTab('kungfu')">⚔ 武功全表</button>
<button onclick="showTab('sects')">🏛 门派全表</button>
<button onclick="showTab('ranking')">🏆 武功排名</button>
<button onclick="showTab('timeline')">⏳ 历史时间线</button>
<button onclick="showTab('map')">🗺️ 地理地图</button>
</nav>

<main>
<!-- ========== 人物索引 ========== -->
<section id="characters" class="active">
<input class="search-box" id="charSearch" placeholder="🔍 搜索人物名、别名、绰号...（如：乔峰、东邪、令狐冲）" oninput="filterChars()">
<div class="tab-sub" id="bookSubNav"></div>
<div id="charContent"></div>
</section>

<!-- ========== 武功全表 ========== -->
<section id="kungfu">
<input class="search-box" id="kfSearch" placeholder="🔍 搜索武功（如：降龙十八掌、独孤九剑、六脉神剑）" oninput="filterKf()">
<div id="kfContent"></div>
</section>

<!-- ========== 门派全表 ========== -->
<section id="sects">
<input class="search-box" id="sectSearch" placeholder="🔍 搜索门派（如：少林、武当、丐帮、日月神教）" oninput="filterSects()">
<div id="sectContent"></div>
</section>

<!-- ========== 武功排名 ========== -->
<section id="ranking">
<input class="search-box" id="rankSearch" placeholder="🔍 搜索排名中的人物..." oninput="renderRanking()">
<div class="tab-sub" id="rankSubNav">
<button class="active" onclick="showRankView('book')">📖 单书排名</button>
</div>
<div id="rankContent"></div>
</section>

<!-- ========== 历史时间线 ========== -->
<section id="timeline">
<div id="tlContent"></div>
</section>

<!-- ========== 地理地图 ========== -->
<section id="map">
<div id="mapContent"></div>
</section>

</main>




</main>

<!-- Detail Panel -->
<div id="detailPanel" class="detail-overlay">
  <div class="detail-container">
    <div class="detail-header">
      <button class="back-btn" onclick="closeDetail()">← 返回</button>
      <span class="detail-type" id="detailType"></span>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

<footer>金庸武侠宇宙数据库 · 基于原著15部小说整理 · 部分关联为合理推断【标注】</footer>

<script>
// ==================== DATA ====================

// ==================== CHARACTERS DATA ====================
const NOVELS = {};

// ---------- 越女剑 ----------
NOVELS['越女剑'] = [
  {name:'阿青',alias:'越女',role:'越国牧羊女·剑术通神',note:'越国牧羊女，与白猿嬉戏中学得通神剑术。一根竹棒闯入越王宫，三千越甲不能挡。见西施容貌后自愧不如黯然离去。结局：不知所踪，剑术仅传下一丝影子即为越女剑法。'},
  {name:'范蠡',alias:'陶朱公',role:'越国大夫',note:'越国大夫。助勾践卧薪尝胆灭吴。深爱西施。请阿青教越国剑士剑术。结局：灭吴后携西施泛舟太湖。'},
  {name:'西施',alias:'夷光',role:'越国美人·入吴为妃',note:'四大美人之首。越国浣纱女，被献于吴王夫差。结局：与范蠡归隐太湖。'},
  {name:'勾践',alias:'越王',role:'越国君主',note:'越王。卧薪尝胆以图复国。请阿青教剑士剑术。结局：灭吴称霸。'},
  {name:'文种',alias:'',role:'越国大夫',note:'越国大夫，献伐吴七术。结局：灭吴后被勾践赐死。'},
  {name:'夫差',alias:'吴王',role:'吴国君主',note:'吴王。宠信西施荒废朝政。结局：被越所灭自杀。'},
  {name:'白猿',alias:'白公公',role:'授阿青剑术之灵猿',note:'山中灵猿，阿青的剑术师父。真实来历成谜。'},
  {name:'越国剑士甲',alias:'',role:'越国剑士·观阿青舞剑',note:'仅学得阿青剑术一丝影子'},
];

// ---------- 天龙八部 ----------
NOVELS['天龙八部'] = [
  {name:'段誉',alias:'',role:'大理世子→皇帝·六脉神剑',note:'大理镇南王世子（实为段延庆之子）。善良单纯、厌武好文。无量山学得凌波微步与北冥神功，天龙寺学六脉神剑。吸尽鸠摩智内力后震古烁今。与乔峰虚竹结为兄弟。结局：回大理登基，与王语嫣终成眷属。'},
  {name:'乔峰/萧峰',alias:'北乔峰',role:'丐帮帮主·契丹人',note:'契丹人原姓萧。豪迈刚烈、顶天立地。凭降龙十八掌成丐帮帮主。杏子林身世揭露后辞位，聚贤庄血战群雄。误杀阿朱成一生之痛。结局：雁门关以性命换辽宋和平，自尽殉义。金庸笔下最悲壮的英雄。'},
  {name:'虚竹',alias:'',role:'灵鹫宫主·西夏驸马',note:'少林最低辈小僧，相貌丑陋心地纯善。误破珍珑棋局获无崖子七十年功力，集逍遥三老武功于一身。西夏招亲与梦姑相认。结局：接任灵鹫宫主，与李清露归隐。'},
  {name:'阿朱',alias:'',role:'段正淳之女·慕容家婢女',note:'段正淳与阮星竹之女。聪明伶俐、精通易容。与乔峰相遇相爱。结局：易容段正淳被乔峰误杀。塞上牛羊空许约。'},
  {name:'阿紫',alias:'',role:'阿朱之妹·星宿派',note:'阿朱之妹。星宿派长大，刁蛮狠毒。痴恋姐夫乔峰。结局：挖眼还游坦之，抱萧峰尸体跳崖。'},
  {name:'王语嫣',alias:'神仙姐姐',role:'慕容复表妹·精通武学',note:'段正淳与李青萝之女，慕容复表妹。精通天下武学但不会武功。痴恋慕容复多年。结局：枯井中被段誉打动，成为大理王妃。'},
  {name:'慕容复',alias:'南慕容',role:'姑苏慕容·大燕皇孙',note:'姑苏慕容少主，燕国皇室后裔。高傲偏执，一生以复兴大燕为目标。与乔峰并称北乔峰南慕容。结局：复国梦碎疯癫，坟头对小儿称帝。'},
  {name:'段正淳',alias:'镇南王',role:'大理镇南王',note:'大理镇南王。风流多情到处留情。情人包括秦红棉甘宝宝阮星竹李青萝康敏。结局：诸情人皆死，自刎殉情。'},
  {name:'段正明',alias:'保定帝',role:'大理皇帝',note:''},
  {name:'刀白凤',alias:'镇南王妃',role:'段正淳正妻·摆夷族',note:'段正淳正妻摆夷族公主。为报复丈夫与段延庆生下段誉。结局：段正淳死后殉情。'},
  {name:'秦红棉',alias:'修罗刀',role:'段正淳情人之一',note:'段正淳情人修罗刀。木婉清之母性格刚烈。结局：被慕容复所杀。'},
  {name:'甘宝宝',alias:'俏药叉',role:'段正淳情人·钟万仇妻',note:'段正淳情人钟灵之母嫁钟万仇。结局：被慕容复所杀。'},

  {name:'康敏',alias:'马夫人',role:'段正淳情人·马大元妻',note:'马大元之妻段正淳旧情人。狠毒善妒。因乔峰不看她而揭露其身世。结局：被阿紫毁容后自杀。'},
  {name:'钟灵',alias:'',role:'段誉之妹(实)·甘宝宝之女',note:'甘宝宝之女。活泼可爱养闪电貂。结局：成大理公主。'},

  {name:'无崖子',alias:'',role:'逍遥派掌门',note:'逍遥派掌门。被丁春秋推落悬崖瘫痪。设珍珑棋局。结局：功力传给虚竹后逝世。'},
  {name:'天山童姥',alias:'',role:'灵鹫宫主·八荒六合',note:'逍遥派大师姐。霸道任性。每三十年返老还童一次。与李秋水争无崖子一生。结局：发现无崖子不爱她们任何一个，大笑而逝。'},

  {name:'丁春秋',alias:'星宿老怪',role:'星宿派掌门',note:'星宿派掌门。心狠手辣善用毒。弑师无崖子后创立星宿派。结局：被虚竹生死符制伏囚于少林。'},
  {name:'苏星河',alias:'聪辩先生',role:'聋哑谷主',note:'无崖子大弟子聪辩先生。精通琴棋书画。结局：被丁春秋所杀。'},

  {name:'郭靖',alias:'北侠',role:'降龙十八掌传人·守襄阳',note:'郭啸天之子。性格憨厚正直坚韧。幼居大漠受江南七怪教导，后拜洪七公学降龙十八掌，周伯通教空明拳和九阴真经。与黄蓉相守一生。结局：镇守襄阳数十年后城破殉国。大侠之大者为国为民。'},
  {name:'黄蓉',alias:'',role:'东邪之女·丐帮帮主',note:'黄药师之女。绝顶聪明机变百出。丐帮第十九代帮主。与郭靖相守一生。结局：与郭靖一同镇守襄阳。'},
  {name:'黄药师',alias:'东邪',role:'桃花岛主',note:'桃花岛主东邪。性格孤傲行事邪气。上通天文下晓地理琴棋书画无一不精。五绝之一。结局：晚年归隐桃花岛。'},
  {name:'欧阳锋',alias:'西毒',role:'白驼山主·蛤蟆功',note:'西域白驼山庄主西毒。蛤蟆功为其绝技。性格阴险狠毒。因逆练九阴真经而疯癫。结局：在华山之巅与洪七公相拥大笑而逝。'},
  {name:'洪七公',alias:'北丐',role:'丐帮帮主·降龙十八掌',note:'丐帮帮主北丐。性格贪吃豪爽。降龙十八掌打狗棒法天下无双。结局：在华山与欧阳锋相拥而逝。'},
  {name:'段智兴',alias:'南帝/一灯',role:'大理皇帝→僧人·一阳指',note:'大理皇帝南帝。因刘瑛姑事件内疚出家。后成一代高僧一灯大师。结局：位列南僧。'},

let rankView = 'book';

function showRankView(view) {
  rankView = view;
  document.querySelectorAll('#rankSubNav button').forEach(b=>b.classList.remove('active'));
  document.querySelector(`#rankSubNav button[onclick*="${view}"]`)?.classList.add('active');
  renderRanking();
}

function renderRanking() {
  const s = (document.getElementById('rankSearch')?.value||'').toLowerCase();
  let html = '';
  
  
    html += `<h3 style="color:var(--head);margin:12px 0">📖 单书武功排名</h3>`;
    for(let [book, rankings] of Object.entries(BOOK_RANKINGS)){
      let filtered = rankings;
      if(s) filtered = rankings.filter(r=>r.name.includes(s)||r.reason.includes(s)||book.includes(s));
      if(filtered.length===0 && s) continue;
      html += `<div class="book-section"><h3 class="book-title">📖 ${book} <span style="font-size:.7em;color:var(--accent)">Top ${rankings.length}</span></h3>
        <div class="book-content" style="display:block;padding:8px">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:6px">`;
      filtered.forEach(r=>{
        const colors = {1:'#ffd700',2:'#c0c0c0',3:'#cd7f32'};
        html += `<div class="rank-card" style="border-left:3px solid ${colors[r.rank]||'#555'}">
          <span style="font-weight:700;color:${colors[r.rank]||'#888'};margin-right:6px">#${r.rank}</span>
          <strong>${r.name}</strong>
          <div style="font-size:.72em;color:#999;margin-top:3px">${r.reason}</div>
        </div>`;
      });
      html += '</div></div></div>';
    }
  document.getElementById('rankContent').innerHTML = html || '<p>未找到匹配</p>';
  
  if(!document.getElementById('rankStyle')){
    const st = document.createElement('style'); st.id='rankStyle';
    st.textContent = `.rank-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 14px;transition:var(--transition)}.rank-card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.4);border-color:#555}`;
    document.head.appendChild(st);
  }
}

// Tab navigation
function showTab(tab) {
  document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  const sec = document.getElementById(tab);
  if(sec) sec.classList.add('active');
  document.querySelector(`nav button[onclick*="${tab}"]`)?.classList.add('active');
  if(tab==='characters') renderCharContent();
  if(tab==='kungfu') renderKfContent();
  if(tab==='sects') renderSectContent();
  if(tab==='ranking') renderRanking();
  if(tab==='timeline') renderTimeline();
  if(tab==='map') renderMap();
}

function showRelTab(sub) {
  document.querySelectorAll('#overview .tab-sub button').forEach(b=>{
    if(b.onclick && b.onclick.toString().includes('showRelTab')) b.classList.remove('active');
  });
  const btns = document.querySelectorAll('#overview .tab-sub button');
  btns.forEach(b=>{
    if(b.getAttribute('onclick') && b.getAttribute('onclick').includes(sub)) b.classList.add('active');
  });
  renderRelContent(sub);
}

// ==================== CHARACTER INDEX ====================
let collapsedBooks = {};

function renderCharContent() {
  const container = document.getElementById('charContent');
  const subNav = document.getElementById('bookSubNav');
  
  subNav.innerHTML = `<button class="active" onclick="filterCharsByBook('all')">全部</button>` +
    Object.keys(NOVELS).map(b => `<button onclick="filterCharsByBook('${b}')">${b}</button>`).join('');
  
  let currentFilter = container.dataset.filter || 'all';
  let searchTerm = (document.getElementById('charSearch')?.value || '').toLowerCase();
  
  let html = '';
  for(let [novel, chars] of Object.entries(NOVELS)) {
    if(currentFilter !== 'all' && novel !== currentFilter) continue;
    let filteredChars = chars;
    if(searchTerm) {
      filteredChars = chars.filter(c => 
        c.name.toLowerCase().includes(searchTerm) || 
        (c.alias||'').toLowerCase().includes(searchTerm) ||
        c.role.toLowerCase().includes(searchTerm) ||
        (c.note||'').toLowerCase().includes(searchTerm) ||
        novel.toLowerCase().includes(searchTerm)
      );
    }
    if(searchTerm && filteredChars.length === 0) continue;
    
    const collapsed = collapsedBooks[novel];
    html += `<div class="book-section" id="book-${novel}">
      <h3 class="book-title" onclick="toggleBook('${novel}')">
        📖 ${novel} <span style="font-size:.7em;color:var(--accent)">(${chars.length}人·${filteredChars.length})</span>
        <span class="toggle">${collapsed?'▶':'▼'}</span>
      </h3>
      <div class="book-content" style="${collapsed?'display:none':''}">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;padding:10px">`;
    
    filteredChars.forEach((c,i) => {
      html += `<div class="char-card" onclick="openCharDetail('${novel.replace(/'/g,"\\'")}','${c.name.replace(/'/g,"\\'")}')">
        <div class="char-name">${c.name}</div>
        ${c.alias?`<div style="font-size:.72em;color:var(--accent)">${c.alias}</div>`:''}
        <div style="font-size:.68em;color:#777">${c.role.split('·')[0]}</div>
      </div>`;
    });
    
    html += `</div></div></div>`;
  }
  container.innerHTML = html || '<p style="color:var(--accent);padding:20px">未找到匹配人物</p>';
  
  if(!document.getElementById('charCardStyle')){
    const style = document.createElement('style');
    style.id='charCardStyle';
    style.textContent = `.char-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 28px 12px 14px;transition:var(--transition);position:relative}.char-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.4)}`;
    document.head.appendChild(style);
  }
}

function openCharDetail(novel, name) {
  const novelChars = NOVELS[novel] || [];
  const c = novelChars.find(x=>x.name===name);
  if(!c) return;
  
  // Find relations involving this character
  if(allRelations.blood.length===0) buildRelations();
  const relatedRels = [];
  [...allRelations.blood, ...allRelations.master, ...allRelations.emotion].forEach(r => {
    if(r.a===c.name){relatedRels.push({other:r.b,otherBook:r.bb,rel:r.rel,arrow:'→',evidence:r.evidence});}
    else if(r.b===c.name || r.b.includes(c.name)){relatedRels.push({other:r.a,otherBook:r.ab,rel:r.rel,arrow:'←',evidence:r.evidence});}
  });
  
  document.getElementById('detailType').textContent = `📖 ${novel}`;
  document.getElementById('detailBody').innerHTML = `
    <div class="detail-hero">
      <h2>${c.name}</h2>
      <div class="hero-sub">
        ${c.alias?`<span>${c.alias}</span>`:''}
        ${c.alias?'<span style="color:#555">·</span>':''}
        <span>${c.role}</span>
      </div>
    </div>
    <div class="detail-sections">
      <div class="detail-grid">
        <div class="detail-info-card">
          <div class="card-label">📖 出处</div>
          <div class="card-value"><strong>${novel}</strong></div>
        </div>
        ${c.alias?`<div class="detail-info-card">
          <div class="card-label">🏷 别名</div>
          <div class="card-value">${c.alias}</div>
        </div>`:''}
        <div class="detail-info-card">
          <div class="card-label">🎭 身份</div>
          <div class="card-value">${c.role}</div>
        </div>
      </div>
      ${c.note?`<div class="detail-section">
        <h3>📜 主要事迹</h3>
        <div class="content">${c.note}</div>
      </div>`:''}
      ${relatedRels.length>0?`<div class="detail-section">
        <h3>🔗 关联人物</h3>
        <div class="detail-rel-list">
          ${relatedRels.slice(0,12).map(r=>`<div class="detail-rel-item">
            <span class="rel-a">${r.other}</span>
            <span style="font-size:.65em;opacity:.4">[${r.otherBook}]</span>
            <span class="rel-arrow">${r.arrow}</span>
            <span class="rel-type">${r.rel}</span>
          </div>`).join('')}
        </div>
      </div>`:''}
    </div>
  `;
  document.getElementById('detailPanel').classList.add('show');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('show');
}

function toggleBook(book) {
  collapsedBooks[book] = !collapsedBooks[book];
  renderCharContent();
}

function filterCharsByBook(book) {
  document.getElementById('charContent').dataset.filter = book;
  document.querySelectorAll('#bookSubNav button').forEach(b=>b.classList.remove('active'));
  if(book==='all') document.querySelector('#bookSubNav button')?.classList.add('active');
  document.getElementById('charSearch').value = '';
  renderCharContent();
  if(book!=='all') {
    setTimeout(()=>document.getElementById('book-'+book)?.scrollIntoView({behavior:'smooth'}),100);
  }
}

function filterChars() {
  renderCharContent();
}

function renderRelContent(sub='blood') {
  if(allRelations.blood.length===0) buildRelations();
  const rels = allRelations[sub] || [];
  const searchTerm = (document.getElementById('relSearch')?.value || '').toLowerCase();
  let filtered = rels;
  if(searchTerm) {
    filtered = rels.filter(r => 
      r.a.toLowerCase().includes(searchTerm) || r.b.toLowerCase().includes(searchTerm) ||
      r.rel.includes(searchTerm) || r.ab.includes(searchTerm) || r.bb.includes(searchTerm)
    );
  }
  
  const titles = {blood:'🩸 血缘家族', master:'📜 师徒/传功', emotion:'💕 情感/恩怨'};
  const icons = {blood:'🧬', master:'📖', emotion:'💘'};
  const borderColors = {blood:'#e05555', master:'#5cb878', emotion:'#c070c0'};
  const typeTags = {blood:'血缘', master:'师徒', emotion:'情怨'};
  
  let html = `<h3 style="color:var(--head);margin:12px 0">${titles[sub]} <span style="font-size:.65em;color:#888">${filtered.length}条</span></h3>`;
  filtered.forEach(r => {
    html += `<div class="rel-card-new" style="border-left:3px solid ${borderColors[r.cat]||'#555'}">
      <div class="rel-emoji">${icons[r.cat]||'🔗'}</div>
      <div class="rel-content">
        <div class="rel-names">
          <span class="rel-a">${r.a}</span><span class="rel-book">${r.ab}</span>
          <span class="rel-connector">${r.rel}</span>
          <span class="rel-b">${r.b}</span><span class="rel-book">${r.bb}</span>
        </div>
        <div class="rel-proof">${r.evidence}</div>
      </div>
    </div>`;
  });
  document.getElementById('relContent').innerHTML = html || '<p>未找到</p>';
  
  if(!document.getElementById('relNewStyle')){
    const s = document.createElement('style'); s.id='relNewStyle';
    s.textContent = `.rel-card-new{display:flex;align-items:flex-start;gap:14px;background:var(--panel);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius);padding:16px 18px;margin:6px 0;transition:var(--transition)}.rel-card-new:hover{border-color:rgba(255,255,255,.1);box-shadow:0 4px 16px rgba(0,0,0,.2);transform:translateY(-1px)}.rel-emoji{font-size:1.4em;flex-shrink:0;padding-top:2px}.rel-content{flex:1}.rel-names{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:4px}.rel-a,.rel-b{font-weight:600;color:var(--head);font-size:.88em}.rel-book{font-size:.65em;color:#666}.rel-connector{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.7em;font-weight:600;color:var(--accent);background:rgba(212,160,96,.1);border:1px solid rgba(212,160,96,.2)}.rel-proof{font-size:.72em;color:#777;font-style:italic}`;
    document.head.appendChild(s);
  }
}

function renderKfContent() {
  if(allKungfu.length===0) buildKungfu();
  const s = (document.getElementById('kfSearch')?.value||'').toLowerCase();
  let filtered = allKungfu;
  if(s) filtered = allKungfu.filter(k=>k.name.toLowerCase().includes(s)||k.users.toLowerCase().includes(s)||k.books.toLowerCase().includes(s)||(k.desc||'').toLowerCase().includes(s));
  
  let html = `<h3 style="color:var(--head);margin:12px 0">⚔ 有名武功全表 (${filtered.length}种) — 点击查看详情</h3><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px">`;
  filtered.forEach((k,i) => {
    html += `<div class="kf-card clickable" onclick="openKfDetail(${i},'${k.name.replace(/'/g,"\\'")}')">
      <h4>${k.name} ${k.cross?'<span style="font-size:.7em;color:#fc9">🔗跨书</span>':''}</h4>
      <div class="user">👤 ${k.users}</div>
      <div class="book">📖 ${k.books}</div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('kfContent').innerHTML = html;
}

function openKfDetail(idx, name) {
  if(allKungfu.length===0) buildKungfu();
  const k = allKungfu.find(x=>x.name===name) || allKungfu[idx];
  if(!k) return;
  document.getElementById('detailType').textContent = '⚔ 武功详情';
  document.getElementById('detailBody').innerHTML = `
    <div class="detail-hero">
      <h2>${k.name}</h2>
      <div class="hero-sub">
        ${k.cross?'<span class="hero-tag cross">🔗 跨书传承</span>':'<span class="hero-tag nocross">仅单部</span>'}
        <span style="color:#555">·</span>
        <span>${k.books}</span>
      </div>
    </div>
    <div class="detail-sections">
      <div class="detail-grid">
        <div class="detail-info-card"><div class="card-label">📖 出现书目</div><div class="card-value"><strong>${k.books}</strong></div></div>
        <div class="detail-info-card"><div class="card-label">👤 使用者</div><div class="card-value">${k.users}</div></div>
        <div class="detail-info-card"><div class="card-label">🔗 传承</div><div class="card-value">${k.cross?'跨书传承 · 多部出现':'仅单部小说中出现'}</div></div>
      </div>
      ${k.desc?`<div class="detail-section"><h3>📜 武学简介</h3><div class="content">${k.desc}</div></div>`:''}
    </div>
  `;
  document.getElementById('detailPanel').classList.add('show');
}

function filterKf() { renderKfContent(); }

function openSectDetail(idx, name) {
  if(allSects.length===0) buildSects();
  const k = allSects.find(x=>x.name===name) || allSects[idx];
  if(!k) return;
  const colorMap = {'佛家门派':'#1a3a1a,#9f9,#2a5a2a','道家门派':'#1a2a3a,#9cf,#2a4a5a','邪派':'#3a1a1a,#f99,#5a2a2a','隐世':'#2a2a1a,#ff9,#4a4a2a','帮会':'#2a1a2a,#c9f,#4a2a4a','教派':'#3a1a2a,#f9c,#5a2a3a','联盟':'#1a3a2a,#9fc,#2a5a3a','世家':'#1a2a2a,#9cc,#2a4a4a','皇族武学':'#3a3a1a,#fc9,#5a5a2a','宗教组织':'#2a1a3a,#c9c,#4a2a5a'};
  const c = colorMap[k.type]||'#2a2a3a,#ccc,#444';
  const [bg,fg,bd] = c.split(',');
  document.getElementById('detailType').textContent = '🏛 门派详情';
  document.getElementById('detailBody').innerHTML = `
    <div class="detail-hero">
      <h2>${k.name}</h2>
      <div class="hero-sub">
        <span class="hero-tag" style="background:${bg};color:${fg};border-color:${bd}">${k.type}</span>
        <span style="color:#555">·</span>
        <span>${k.books}</span>
      </div>
    </div>
    <div class="detail-sections">
      <div class="detail-grid">
        <div class="detail-info-card"><div class="card-label">🏷 类型</div><div class="card-value"><strong>${k.type}</strong></div></div>
        <div class="detail-info-card"><div class="card-label">📖 出现书目</div><div class="card-value">${k.books}</div></div>
        <div class="detail-info-card"><div class="card-label">📌 状态</div><div class="card-value">${k.status}</div></div>
      </div>
      ${k.desc?`<div class="detail-section"><h3>📜 门派简介</h3><div class="content">${k.desc}</div></div>`:''}
    </div>
  `;
  document.getElementById('detailPanel').classList.add('show');
}

function filterSects() { renderSectContent(); }

function renderSectContent() {
  if(allSects.length===0) buildSects();
  const s = (document.getElementById('sectSearch')?.value||'').toLowerCase();
  let filtered = allSects;
  if(s) filtered = allSects.filter(k=>k.name.toLowerCase().includes(s)||k.books.toLowerCase().includes(s)||k.status.toLowerCase().includes(s)||(k.desc||'').toLowerCase().includes(s));
  let html = `<h3 style="color:var(--head);margin:12px 0">🏛 门派/组织全表 (${filtered.length}个) — 点击查看详情</h3><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px">`;
  filtered.forEach((k,i) => {
    html += `<div class="kf-card clickable" onclick="openSectDetail(${i},'${k.name.replace(/'/g,"\\'")}')">
      <h4>${k.name} <span style="font-size:.65em;color:#888">[${k.type}]</span></h4>
      <div class="user">📖 ${k.books}</div><div class="book">📌 ${k.status}</div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('sectContent').innerHTML = html;
}

function renderTimeline() {
  let html = '<h3 style="color:var(--head);margin:12px 0 20px">⏳ 金庸宇宙 · 历史时间线 <span style="font-size:.65em;color:#888">(' + TIMELINE_EVENTS.length + '个事件)</span></h3><div class="tl-wrap">';
  let lastEra = '';
  TIMELINE_EVENTS.forEach(e => {
    if(e.era !== lastEra){
      html += `<div class="tl-era"><h3>${e.era}</h3></div>`;
      lastEra = e.era;
    }
    html += `<div class="tl-row">
      <div class="tl-date-badge"><span>${e.date}</span></div>
      <div class="tl-card">
        <div class="tl-title">${e.title}</div>
        <div class="tl-desc">${e.desc}</div>
        <span class="tl-book" style="background:${e.color}22;color:${e.color};border:1px solid ${e.color}44">📖 ${e.book}</span>
      </div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('tlContent').innerHTML = html;
}

window.renderTimeline = renderTimeline;

function renderMap() {
  const areas = {};
  MAP_LOCATIONS.forEach(l => {if(!areas[l.area])areas[l.area]=[];areas[l.area].push(l);});
  let html = '<h3 style="color:var(--head);margin:12px 0 16px">🗺️ 金庸世界地图 <span style="font-size:.65em;color:#888">(' + MAP_LOCATIONS.length + '处地点)</span></h3>';
  for(let [area,locs] of Object.entries(areas)){
    html += `<h4 style="color:var(--accent);margin:16px 0 8px;padding-left:0">📍 ${area}</h4><div class="map-grid">`;
    locs.forEach(l=>{
      html += `<div class="map-card" style="border-left-color:${l.color}">
        <h4>${l.name}</h4><div class="map-book">📖 ${l.book}</div>
        <div class="map-desc">${l.desc}</div>
      </div>`;
    });
    html += '</div>';
  }
  document.getElementById('mapContent').innerHTML = html;
}
